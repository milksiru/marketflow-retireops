apiVersion: v1
kind: ConfigMap
metadata:
  name: oauth2-proxy-allowed-emails
  namespace: marketflow
data:
  allowed-emails.txt: |
    3siksfather@gmail.com
    pjy3984@gmail.com
---
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-secret
  namespace: marketflow
type: Opaque
stringData:
  client-id: "replace-with-google-oauth-client-id"
  client-secret: "replace-with-google-oauth-client-secret"
  cookie-secret: "0123456789abcdef0123456789abcdef"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: marketflow
  labels:
    app: oauth2-proxy
  annotations:
    oauth2-proxy.marketflow/source-image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: 192.168.55.148:5000/oauth2-proxy/oauth2-proxy:v7.15.2
          imagePullPolicy: IfNotPresent
          args:
            - --provider=google
            - --http-address=0.0.0.0:4180
            - --redirect-url=https://marketflow.nas-3siks.synology.me/oauth2/callback
            - --authenticated-emails-file=/etc/oauth2-proxy/allowed-emails.txt
            - --cookie-secure=true
            - --cookie-httponly=true
            - --cookie-samesite=lax
            - --cookie-refresh=1h
            - --cookie-expire=8h
            - --reverse-proxy=true
            - --set-xauthrequest=true
            - --pass-access-token=true
            - --set-authorization-header=true
            - --pass-authorization-header=true
            - --upstream=static://200
          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secret
                  key: client-id
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secret
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secret
                  key: cookie-secret
          ports:
            - name: http
              containerPort: 4180
          volumeMounts:
            - name: allowed-emails
              mountPath: /etc/oauth2-proxy
              readOnly: true
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: allowed-emails
          configMap:
            name: oauth2-proxy-allowed-emails
            items:
              - key: allowed-emails.txt
                path: allowed-emails.txt
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: marketflow
spec:
  selector:
    app: oauth2-proxy
  ports:
    - name: http
      port: 4180
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: oauth2-proxy
  namespace: marketflow
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - marketflow.nas-3siks.synology.me
      secretName: marketflow-home-arpa-tls
  rules:
    - host: marketflow.nas-3siks.synology.me
      http:
        paths:
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: oauth2-proxy
                port:
                  number: 4180
