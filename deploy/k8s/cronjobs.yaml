apiVersion: batch/v1
kind: CronJob
metadata:
  name: morning-report-cronjob
  namespace: apps
spec:
  schedule: "30 7 * * 1-5"
  timeZone: Asia/Seoul
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: report
              image: 192.168.55.148:5000/milksiru/marketflow-retireops:9f481c026c6a
              command: ["python", "-m", "app.jobs", "morning"]
              envFrom:
                - secretRef:
                    name: marketflow-retireops-secrets
              volumeMounts:
                - name: data
                  mountPath: /data
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: marketflow-retireops-data
---
