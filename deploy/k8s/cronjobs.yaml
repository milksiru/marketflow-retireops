apiVersion: batch/v1
kind: CronJob
metadata:
  name: collector-cronjob
  namespace: apps
spec:
  schedule: "*/10 * * * *"
  timeZone: Asia/Seoul
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: collector
              image: 192.168.55.148:5000/milksiru/marketflow-retireops:c7747b3007a9
              args: ["collect"]
              envFrom:
                - secretRef:
                    name: marketflow-retireops-secrets
              volumeMounts:
                - name: data
                  mountPath: /data
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: marketflow-retireops-data
---
