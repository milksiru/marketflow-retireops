apiVersion: v1
kind: Service
metadata:
  name: marketflow-retireops
  namespace: marketflow
spec:
  type: ExternalName
  externalName: marketflow-retireops.apps.svc.cluster.local
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: marketflow-retireops
  namespace: marketflow
  annotations:
    nginx.ingress.kubernetes.io/auth-url: "https://marketflow.nas-3siks.synology.me/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "https://marketflow.nas-3siks.synology.me/oauth2/start?rd=$escaped_request_uri"
    nginx.ingress.kubernetes.io/auth-response-headers: "X-Auth-Request-User,X-Auth-Request-Email,Authorization"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - marketflow.nas-3siks.synology.me
      secretName: marketflow-home-arpa-tls
  rules:
    - host: marketflow.nas-3siks.synology.me
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: marketflow-retireops
                port:
                  number: 80
